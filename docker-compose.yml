
services:

  # ---------------------
  # 1. PostgreSQL
  # ---------------------
  postgres:
    image: postgres:15
    container_name: refnet_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: referraldb
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  pgadmin:
    image: dpage/pgadmin4
    container_name: refnet_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@refnet.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data: